name = "doom-lobby"
main = "src/worker.ts"
compatibility_date = "2024-12-01"

[durable_objects]
bindings = [{ name = "LOBBY", class_name = "DoomLobby" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["DoomLobby"]

# WAD + WASM assets served from static assets
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "none"
serve_directly = false
