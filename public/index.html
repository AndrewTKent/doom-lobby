<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="DOOM Lobby">
  <meta property="og:description" content="Click link. Play DOOM. Kill friends. Multiplayer DOOM in your browser — no download, no account.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/social-preview.png">
  <meta name="description" content="Instant multiplayer DOOM in your browser. Share a link, start a deathmatch.">
  <title>DOOM Lobby</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      color: #eee;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    #header {
      padding: 16px;
      text-align: center;
      z-index: 10;
    }

    #header h1 {
      font-size: 28px;
      color: #c00;
      text-shadow: 0 0 20px rgba(204, 0, 0, 0.5);
      letter-spacing: 4px;
    }

    #header .subtitle {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    /* ── Landing page ── */
    #landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex: 1;
      padding: 40px;
    }

    .btn {
      background: #c00;
      color: #fff;
      border: none;
      padding: 16px 40px;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .btn:hover {
      background: #e00;
      transform: scale(1.05);
    }

    .btn-secondary {
      background: #333;
    }

    .btn-secondary:hover {
      background: #555;
    }

    /* ── Lobby ── */
    #lobby {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 20px;
      flex: 1;
    }

    #lobby-info {
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 20px;
      border-radius: 4px;
      text-align: center;
      min-width: 320px;
    }

    #lobby-info .player-count {
      font-size: 48px;
      color: #c00;
      font-weight: bold;
    }

    #lobby-info .player-max {
      font-size: 14px;
      color: #666;
    }

    #player-list {
      list-style: none;
      margin: 12px 0;
    }

    #player-list li {
      padding: 4px 0;
      color: #aaa;
      font-size: 14px;
    }

    #player-list li::before {
      content: '> ';
      color: #c00;
    }

    .share-section {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #share-url {
      background: #222;
      border: 1px solid #444;
      color: #eee;
      padding: 10px 14px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      width: 300px;
      text-align: center;
    }

    .btn-copy {
      background: #333;
      color: #eee;
      border: 1px solid #444;
      padding: 10px 16px;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      font-size: 13px;
    }

    .btn-copy:hover { background: #444; }

    #qr-container {
      background: #fff;
      padding: 8px;
      border-radius: 4px;
      display: inline-block;
    }

    #qr-container canvas {
      display: block;
    }

    /* ── Game ── */
    #game-container {
      display: none;
      flex-direction: column;
      align-items: center;
      flex: 1;
      width: 100%;
    }

    #doom-canvas {
      background: #000;
      image-rendering: pixelated;
      cursor: crosshair;
    }

    #game-status {
      padding: 8px 16px;
      font-size: 12px;
      color: #666;
    }

    #kill-feed {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 50;
      font-size: 13px;
      text-align: right;
      pointer-events: none;
    }

    #kill-feed div {
      background: rgba(0, 0, 0, 0.7);
      color: #eee;
      padding: 4px 10px;
      margin-bottom: 4px;
      border-radius: 2px;
      animation: killfade 3s forwards;
    }

    @keyframes killfade {
      0% { opacity: 1; }
      70% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ── Loading ── */
    #loading {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex: 1;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #c00;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-text {
      font-size: 14px;
      color: #888;
    }

    /* ── Name input ── */
    #name-input {
      background: #222;
      border: 1px solid #444;
      color: #eee;
      padding: 10px 14px;
      font-family: 'Courier New', monospace;
      font-size: 16px;
      text-align: center;
      width: 200px;
    }

    #name-input::placeholder {
      color: #555;
    }

    /* ── Lobby chat ── */
    #chat-box {
      width: 320px;
      max-height: 120px;
      overflow-y: auto;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 8px;
      font-size: 12px;
    }

    #chat-box div {
      padding: 2px 0;
      color: #aaa;
    }

    #chat-box .chat-name {
      color: #c00;
      font-weight: bold;
    }

    #chat-input {
      background: #222;
      border: 1px solid #444;
      color: #eee;
      padding: 8px 12px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      width: 320px;
      margin-top: 4px;
    }

    /* ── Touch controls ── */
    #touch-controls {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 160px;
      pointer-events: none;
      z-index: 100;
    }

    #touch-controls .touch-btn {
      position: absolute;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(204, 0, 0, 0.3);
      border: 2px solid rgba(204, 0, 0, 0.5);
      color: #fff;
      font-size: 20px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #touch-controls .touch-btn:active {
      background: rgba(204, 0, 0, 0.6);
    }

    #touch-dpad { position: absolute; left: 20px; bottom: 20px; width: 140px; height: 140px; pointer-events: none; }
    #touch-up { left: 42px; top: 0; }
    #touch-down { left: 42px; bottom: 0; }
    #touch-left { left: 0; top: 42px; }
    #touch-right { right: 0; top: 42px; }
    #touch-fire { right: 20px; bottom: 60px; width: 72px; height: 72px; font-size: 14px; border-radius: 50%; }
    #touch-use { right: 100px; bottom: 40px; font-size: 12px; }

    /* ── Game in progress ── */
    #game-in-progress {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex: 1;
      padding: 40px;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="header">
    <h1>DOOM LOBBY</h1>
    <div class="subtitle">click link. play doom. kill friends.</div>
  </div>

  <!-- Landing -->
  <div id="landing">
    <button class="btn" onclick="startSolo()">SOLO</button>
    <button class="btn" onclick="createLobby()">HOST DEATHMATCH</button>
    <div style="color: #444; font-size: 12px; margin-top: 20px;">
      or join a game by pasting a lobby link
    </div>
  </div>

  <!-- Lobby (waiting room) -->
  <div id="lobby">
    <div id="lobby-info">
      <div class="player-count" id="player-count">1</div>
      <div class="player-max">/ 4 players</div>
      <ul id="player-list"></ul>
    </div>

    <div style="margin: 8px 0;">
      <input id="name-input" type="text" placeholder="Your name" maxlength="16" />
    </div>

    <div class="share-section">
      <input id="share-url" type="text" readonly />
      <button class="btn-copy" onclick="copyLink()">COPY</button>
    </div>

    <div id="qr-container">
      <canvas id="qr-canvas"></canvas>
    </div>

    <div id="mode-select" style="display: flex; gap: 8px; margin-top: 4px;">
      <button class="btn-copy" onclick="setGameMode('deathmatch')" id="mode-dm" style="border-color: #c00;">DEATHMATCH</button>
      <button class="btn-copy" onclick="setGameMode('coop')" id="mode-coop">CO-OP</button>
    </div>

    <button class="btn" id="start-btn" onclick="startGame()">START GAME</button>
    <div id="waiting-msg" class="hidden" style="color: #888; font-size: 13px;">
      Waiting for host to start...
    </div>

    <div id="chat-box"></div>
    <input id="chat-input" type="text" placeholder="Chat..." maxlength="200"
           onkeydown="if(event.key==='Enter')sendChat()" />
  </div>

  <!-- Game in progress -->
  <div id="game-in-progress">
    <div style="font-size: 20px; color: #c00;">GAME IN PROGRESS</div>
    <div style="color: #888; font-size: 14px;">This lobby is already playing. Wait for the next round.</div>
    <button class="btn btn-secondary" onclick="window.location.href='/play'">HOST NEW GAME</button>
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    <div id="loading-text">Loading DOOM...</div>
  </div>

  <!-- Game -->
  <div id="game-container">
    <canvas id="doom-canvas" tabindex="1"></canvas>
    <div id="game-status"></div>
    <div id="kill-feed"></div>
  </div>

  <!-- Touch controls (mobile) -->
  <div id="touch-controls">
    <div id="touch-dpad">
      <div class="touch-btn" id="touch-up">W</div>
      <div class="touch-btn" id="touch-down">S</div>
      <div class="touch-btn" id="touch-left">A</div>
      <div class="touch-btn" id="touch-right">D</div>
    </div>
    <div class="touch-btn" id="touch-fire">FIRE</div>
    <div class="touch-btn" id="touch-use">USE</div>
  </div>

  <!-- QR Code library (tiny, inline) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>

  <script>
    // ─── State ────────────────────────────────────────────────────────────
    let lobbyId = null;
    let isHost = false;
    let lobbyWs = null;
    let gameLaunching = false;
    let playerName = `Marine-${Math.random().toString(36).slice(2, 6)}`;
    let gameMode = 'deathmatch';

    function setGameMode(mode) {
      gameMode = mode;
      document.getElementById('mode-dm').style.borderColor = mode === 'deathmatch' ? '#c00' : '#444';
      document.getElementById('mode-coop').style.borderColor = mode === 'coop' ? '#c00' : '#444';
    }

    // Check if we landed on /play/:id
    const pathMatch = window.location.pathname.match(/^\/play\/([a-z0-9]+)$/);
    if (pathMatch) {
      lobbyId = pathMatch[1];
      isHost = false;
      joinLobby(lobbyId);
    }

    // ─── Views ────────────────────────────────────────────────────────────
    function showView(id) {
      ['landing', 'lobby', 'game-in-progress', 'loading', 'game-container'].forEach(v => {
        document.getElementById(v).style.display = 'none';
      });
      const el = document.getElementById(id);
      el.style.display = 'flex';
    }

    // ─── Solo Mode ────────────────────────────────────────────────────────
    function startSolo() {
      showView('loading');
      document.getElementById('loading-text').textContent = 'Loading DOOM...';
      loadAndStartDoom([]);
    }

    // ─── Create Lobby ─────────────────────────────────────────────────────
    async function createLobby() {
      const res = await fetch('/api/lobby', { method: 'POST' });
      const data = await res.json();
      lobbyId = data.id;
      isHost = true;
      window.history.pushState({}, '', `/play/${lobbyId}`);
      joinLobby(lobbyId);
    }

    // ─── Join Lobby ───────────────────────────────────────────────────────
    async function joinLobby(id) {
      showView('lobby');

      // Check if game already started
      const statusRes = await fetch('/api/lobby/' + id);
      const status = await statusRes.json();
      if (status.gameStarted) {
        showView('game-in-progress');
        return;
      }

      const shareUrl = `${window.location.origin}/play/${id}`;
      document.getElementById('share-url').value = shareUrl;
      document.getElementById('name-input').value = playerName;

      // Show/hide host-only controls
      document.getElementById('start-btn').classList.toggle('hidden', !isHost);
      document.getElementById('mode-select').classList.toggle('hidden', !isHost);
      document.getElementById('waiting-msg').classList.toggle('hidden', isHost);

      // Generate QR code
      QRCode.toCanvas(document.getElementById('qr-canvas'), shareUrl, {
        width: 128,
        margin: 1,
        color: { dark: '#000', light: '#fff' },
      });

      // Connect control WebSocket for lobby state
      const wsProto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      lobbyWs = new WebSocket(`${wsProto}//${window.location.host}/api/ws/${id}?name=${encodeURIComponent(playerName)}`);

      lobbyWs.onmessage = (event) => {
        if (typeof event.data === 'string') {
          try {
            const msg = JSON.parse(event.data);
            if (msg.type === 'lobby_state') {
              updateLobbyUI(msg);
            }
            if (msg.type === 'chat') {
              appendChat(msg.name, msg.text);
            }
          } catch {}
        }
      };

      lobbyWs.onclose = () => {
        if (!gameLaunching) {
          showView('landing');
        }
      };
    }

    let lastPlayerCount = 0;

    function playJoinSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.setValueAtTime(440, ctx.currentTime);
        osc.frequency.setValueAtTime(660, ctx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
        osc.start();
        osc.stop(ctx.currentTime + 0.2);
      } catch {}
    }

    function updateLobbyUI(state) {
      if (state.playerCount > lastPlayerCount && lastPlayerCount > 0) {
        playJoinSound();
      }
      lastPlayerCount = state.playerCount;

      document.getElementById('player-count').textContent = state.playerCount;
      const list = document.getElementById('player-list');
      list.innerHTML = state.players.map(p => `<li>${escapeHtml(p.name)}</li>`).join('');

      // If game started and we're not the host, auto-launch
      if (state.gameStarted && !isHost) {
        startGame();
      }
    }

    function sendName(name) {
      playerName = name || playerName;
      if (lobbyWs && lobbyWs.readyState === WebSocket.OPEN) {
        lobbyWs.send(JSON.stringify({ type: 'name', name: playerName }));
      }
    }

    let nameTimeout;
    document.getElementById('name-input').addEventListener('input', function() {
      clearTimeout(nameTimeout);
      nameTimeout = setTimeout(() => sendName(this.value), 300);
    });

    function sendChat() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text || !lobbyWs || lobbyWs.readyState !== WebSocket.OPEN) return;
      lobbyWs.send(JSON.stringify({ type: 'chat', text }));
      input.value = '';
    }

    function appendChat(name, text) {
      const box = document.getElementById('chat-box');
      const div = document.createElement('div');
      div.innerHTML = `<span class="chat-name">${escapeHtml(name)}</span>: ${escapeHtml(text)}`;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    function copyLink() {
      const input = document.getElementById('share-url');
      navigator.clipboard.writeText(input.value);
      const btn = document.querySelector('.btn-copy');
      btn.textContent = 'COPIED';
      setTimeout(() => btn.textContent = 'COPY', 2000);
    }

    // ─── Start Game ───────────────────────────────────────────────────────
    function startGame() {
      gameLaunching = true;
      if (isHost && lobbyWs && lobbyWs.readyState === WebSocket.OPEN) {
        lobbyWs.send(JSON.stringify({ type: 'game_started' }));
        // Let the broadcast propagate before closing
        setTimeout(() => {
          if (lobbyWs) { lobbyWs.close(); lobbyWs = null; }
        }, 200);
      } else if (lobbyWs) {
        lobbyWs.close();
        lobbyWs = null;
      }

      showView('loading');
      document.getElementById('loading-text').textContent = 'Loading DOOM engine...';

      const wsUrl = `${window.location.protocol === 'https:' ? 'wss:' : 'ws:'}//${window.location.host}/api/ws/${lobbyId}?phase=game&name=${encodeURIComponent(playerName)}`;

      const modeArgs = gameMode === 'coop' ? ['-solo-net'] : ['-deathmatch'];
      const doomArgs = lobbyId
        ? (isHost
          ? ['-server', '-privateserver', ...modeArgs, '-dup', '1', '-wss', wsUrl]
          : ['-connect', '1', '-dup', '1', '-wss', wsUrl])
        : [];

      loadAndStartDoom(doomArgs);
    }

    // ─── DOOM Engine Loading ──────────────────────────────────────────────
    function loadAndStartDoom(extraArgs) {
      const canvas = document.getElementById('doom-canvas');

      // Size the canvas
      const scale = Math.min(
        (window.innerWidth - 32) / 640,
        (window.innerHeight - 120) / 400
      );
      canvas.width = 640;
      canvas.height = 400;
      canvas.style.width = `${Math.floor(640 * scale)}px`;
      canvas.style.height = `${Math.floor(400 * scale)}px`;

      const commonArgs = [
        '-iwad', 'doom1.wad',
        '-window',
        '-nogui',
        '-nomusic',
        '-config', 'default.cfg',
      ];

      // Set up Emscripten Module
      window.Module = {
        canvas: canvas,
        setStatus: function(text) {
          const loadingText = document.getElementById('loading-text');
          if (!text) return;
          const match = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
          if (match) {
            const pct = Math.round((parseFloat(match[2]) / parseFloat(match[4])) * 100);
            loadingText.textContent = match[1].trim() + ' ' + pct + '%';
          } else {
            loadingText.textContent = text;
          }
        },
        monitorRunDependencies: function(left) {
          if (left === 0) {
            document.getElementById('loading-text').textContent = 'Starting DOOM...';
          }
        },
        noInitialRun: true,
        preRun: [function() {
          // Load WAD into Emscripten virtual filesystem
          Module.FS.createPreloadedFile('', 'doom1.wad', 'doom1.wad', true, true);
          Module.FS.createPreloadedFile('', 'default.cfg', 'default.cfg', true, true);
        }],
        onRuntimeInitialized: function() {
          showView('game-container');
          canvas.focus();
          Module.callMain([...commonArgs, ...extraArgs]);
        },
        print: function(text) {
          console.log('[DOOM]', text);
          // Parse doom: protocol messages
          const match = text.match(/^doom: (\d+), (.+)$/);
          if (match) {
            const code = parseInt(match[1]);
            const msg = match[2];
            document.getElementById('game-status').textContent = msg;
          }
          // Kill feed — look for frag messages from DOOM stdout
          const fragPatterns = [
            /(.+) was killed by (.+)/,
            /(.+) fragged (.+)/,
            /(.+) blew himself up/,
            /(.+) died/,
          ];
          for (const pattern of fragPatterns) {
            if (pattern.test(text)) {
              addKillFeedEntry(text);
              break;
            }
          }
        },
        printErr: function(text) {
          console.error('[DOOM]', text);
        },
      };

      // Load the Emscripten JS glue (which loads the .wasm)
      const script = document.createElement('script');
      script.src = 'websockets-doom.js';
      script.onerror = () => {
        showView('landing');
        alert('Failed to load DOOM engine. Make sure WASM files are built and in /public/');
      };
      document.body.appendChild(script);
    }

    // ─── Utils ────────────────────────────────────────────────────────────
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Handle fullscreen on double-click
    document.getElementById('doom-canvas').addEventListener('dblclick', () => {
      const canvas = document.getElementById('doom-canvas');
      if (canvas.requestFullscreen) canvas.requestFullscreen();
    });

    // ─── Kill Feed ────────────────────────────────────────────────────
    function addKillFeedEntry(text) {
      const feed = document.getElementById('kill-feed');
      const entry = document.createElement('div');
      entry.textContent = text;
      feed.appendChild(entry);
      // Remove after animation
      setTimeout(() => entry.remove(), 3200);
      // Cap visible entries
      while (feed.children.length > 5) feed.firstChild.remove();
    }

    // ─── Touch Controls (mobile) ───────────────────────────────────────
    const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
    if (isTouchDevice) {
      const touchMap = {
        'touch-up': 'w', 'touch-down': 's', 'touch-left': 'a', 'touch-right': 'd',
        'touch-fire': 'Control', 'touch-use': ' ',
      };

      function simulateKey(key, type) {
        const canvas = document.getElementById('doom-canvas');
        canvas.dispatchEvent(new KeyboardEvent(type, {
          key, code: 'Key' + key.toUpperCase(), bubbles: true, cancelable: true,
        }));
      }

      for (const [id, key] of Object.entries(touchMap)) {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); simulateKey(key, 'keydown'); });
        el.addEventListener('touchend', (e) => { e.preventDefault(); simulateKey(key, 'keyup'); });
        el.addEventListener('touchcancel', (e) => { e.preventDefault(); simulateKey(key, 'keyup'); });
      }
    }

    // Show touch controls when game starts (handled in showView override)
    const originalShowView = showView;
    showView = function(id) {
      originalShowView(id);
      if (isTouchDevice) {
        document.getElementById('touch-controls').style.display = id === 'game-container' ? 'block' : 'none';
      }
    };

    // Resize canvas on window resize
    window.addEventListener('resize', () => {
      const canvas = document.getElementById('doom-canvas');
      if (canvas.width > 0) {
        const scale = Math.min(
          (window.innerWidth - 32) / 640,
          (window.innerHeight - 120) / 400
        );
        canvas.style.width = `${Math.floor(640 * scale)}px`;
        canvas.style.height = `${Math.floor(400 * scale)}px`;
      }
    });
  </script>
</body>
</html>
